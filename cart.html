<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang Belanja — VIONVAULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#0c0c0d; --paper:#f2f0ea; --bone:#e7e4db; --blood:#c8362a; --dim:#8a8880; --line:#2a2a2a;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased;}
    a{color:inherit; text-decoration:none;}

    header{
      position:sticky; top:0; z-index:100; background:var(--ink); color:var(--paper);
      display:flex; align-items:center; justify-content:space-between; padding:18px 32px;
      border-bottom:1px solid #1c1c1c;
    }
    .nav-left{display:flex; gap:28px; align-items:center;}
    .nav-left a{font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; position:relative; padding-bottom:3px;}
    .nav-left a::after{content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--blood); transition:width .25s ease;}
    .nav-left a:hover::after{width:100%;}
    .brand{font-family:'Anton', sans-serif; font-size:20px; letter-spacing:.28em; position:absolute; left:50%; transform:translateX(-50%);}
    .nav-right{display:flex; gap:18px; align-items:center;}
    .nav-icon-btn{
      width:36px; height:36px; border-radius:50%;
      border:1px solid rgba(242,240,234,.3); background:transparent; color:var(--paper);
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s ease;
      position:relative;
    }
    .nav-icon-btn:hover{background:var(--blood);}
    .nav-icon-btn.active{background:var(--blood);}
    .nav-icon-btn svg{width:16px; height:16px;}
    .badge-count{
      position:absolute; top:-8px; right:-8px; background:var(--blood);
      color:#fff; font-size:10px; font-weight:700; width:20px; height:20px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
    }
    .auth-btn{
      padding:8px 16px; border-radius:999px; border:1px solid var(--paper);
      background:transparent; color:var(--paper); font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:.2s ease;
    }
    .auth-btn:hover{background:var(--blood); border-color:var(--blood);}

    .page-banner{background:linear-gradient(160deg, #14131a 0%, #1d1c22 40%, #100f13 100%); color:var(--paper); padding:48px 32px 32px; text-align:center;}
    .page-banner h1{font-family:'Anton'; font-size:36px; letter-spacing:.02em; margin-bottom:12px;}

    .cart-container{max-width:1000px; margin:0 auto; padding:32px 20px 64px;}
    .cart-grid{display:grid; grid-template-columns:1fr 320px; gap:32px;}

    .cart-items{background:var(--bone); border-radius:4px;}
    .empty-cart{padding:64px 20px; text-align:center;}
    .empty-cart svg{width:64px; height:64px; margin-bottom:16px; opacity:.3;}
    .empty-cart p{color:var(--dim); margin-bottom:20px;}
    .empty-cart a{display:inline-block; padding:10px 20px; background:var(--ink); color:var(--paper); border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; transition:.2s ease;}
    .empty-cart a:hover{background:var(--blood);}

    .cart-item{display:flex; gap:16px; padding:16px; border-bottom:1px solid rgba(0,0,0,.08);}
    .cart-item:last-child{border-bottom:none;}
    .item-image{width:100px; height:120px; background:#111; flex-shrink:0; border-radius:4px; overflow:hidden;}
    .item-image img{width:100%; height:100%; object-fit:contain;}
    .item-details{flex:1;}
    .item-name{font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:8px; line-height:1.3;}
    .item-price{color:var(--blood); font-size:14px; font-weight:800; margin-bottom:12px;}
    .qty-ctrl{display:flex; align-items:center; gap:8px; width:fit-content;}
    .qty-btn{width:28px; height:28px; border:1px solid var(--line); background:transparent; cursor:pointer; border-radius:2px; transition:.2s ease;}
    .qty-btn:hover{background:var(--ink); color:var(--paper);}
    .qty-input{width:40px; text-align:center; border:1px solid var(--line); padding:4px; border-radius:2px;}
    .remove-btn{color:var(--blood); font-size:12px; font-weight:700; cursor:pointer; text-decoration:underline; margin-top:8px;}

    .cart-summary{background:var(--ink); color:var(--paper); padding:24px; border-radius:4px; height:fit-content; position:sticky; top:100px;}
    .summary-title{font-family:'Anton'; font-size:18px; margin-bottom:20px;}
    .summary-row{display:flex; justify-content:space-between; margin-bottom:12px; font-size:13px;}
    .summary-row.total{border-top:1px solid rgba(255,255,255,.2); padding-top:12px; font-size:16px; font-weight:800; color:var(--blood);}
    .checkout-btn{width:100%; padding:12px; background:var(--blood); color:#fff; border:none; border-radius:4px; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; margin-top:20px; transition:.2s ease;}
    .checkout-btn:hover{opacity:.9;}
    .checkout-btn:disabled{opacity:.5; cursor:not-allowed;}

    footer{background:var(--ink); color:var(--dim); text-align:center; padding:30px 20px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; margin-top:32px;}

    @media (max-width:768px){
      .cart-grid{grid-template-columns:1fr; gap:24px;}
      .cart-summary{position:relative; top:0;}
    }
    @media (max-width:560px){
      header{padding:12px 16px;}
      .nav-left{gap:14px;}
      .nav-left a{font-size:10px;}
      .brand{font-size:15px; letter-spacing:.2em;}
      .page-banner h1{font-size:28px;}
      .cart-container{padding:20px 16px 40px;}
    }
  </style>
</head>
<body>

<header>
  <div class="nav-left">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="collection.html">Collection</a>
    <a href="looks.html">Looks</a>
  </div>
  <a href="index.html" class="brand">VIONVAULT</a>
  <div class="nav-right">
    <a href="favorites.html" class="nav-icon-btn" title="Favorit">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </a>
    <a href="cart.html" class="nav-icon-btn active" title="Keranjang">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="badge-count" id="cartBadge" style="display:none;">0</span>
    </a>
    <button class="auth-btn" id="authBtnCart">Login</button>
  </div>
</header>

<section class="page-banner">
  <h1>🛍 Keranjang Belanja</h1>
</section>

<section class="cart-container">
  <div class="cart-grid">
    <div class="cart-items" id="cartItems">
      <div class="empty-cart">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <p>Keranjang belanja Anda kosong</p>
        <a href="shop.html">Lanjut Belanja →</a>
      </div>
    </div>
    <div class="cart-summary" id="cartSummary" style="display:none;">
      <div class="summary-title">Ringkasan Pesanan</div>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">Rp0</span>
      </div>
      <div class="summary-row">
        <span>Ongkir</span>
        <span id="shipping">Gratis</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="total">Rp0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>
  </div>
</section>

<footer>© 2026 VionVault — Rework Your Style</footer>

<script>
const products = [
  {id:1, name:'T-Shirt Boxy Crop — Sparkle Vision', price:151980},
  {id:2, name:'Longsleeve Boxy — Victory Bound', price:174440},
  {id:3, name:'Hoodie Boxy Zipper — Dragon Mask', price:364780},
  {id:4, name:'Hoodie Boxy — Midnight Reserve', price:334880},
  {id:5, name:'Hoodie Boxy — Street Sketch', price:334880},
];

function formatRp(n){ return 'Rp' + n.toLocaleString('id-ID'); }

function getCart(){
  const cart = localStorage.getItem('cart');
  return cart ? JSON.parse(cart) : [];
}

function saveCart(cart){
  localStorage.setItem('cart', JSON.stringify(cart));
  updateBadge();
}

function addToCart(id, qty=1){
  const cart = getCart();
  const item = cart.find(x => x.id === id);
  if(item){
    item.qty += qty;
  } else {
    cart.push({id, qty});
  }
  saveCart(cart);
}

function removeFromCart(id){
  const cart = getCart().filter(x => x.id !== id);
  saveCart(cart);
  renderCart();
}

function updateQty(id, qty){
  const cart = getCart();
  const item = cart.find(x => x.id === id);
  if(item){
    item.qty = Math.max(1, parseInt(qty));
  }
  saveCart(cart);
  renderCart();
}

function updateBadge(){
  const cart = getCart();
  const count = cart.reduce((a, b) => a + b.qty, 0);
  const badge = document.getElementById('cartBadge');
  if(count > 0){
    badge.textContent = count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function renderCart(){
  const cart = getCart();
  const cartItems = document.getElementById('cartItems');
  const summary = document.getElementById('cartSummary');
  
  if(cart.length === 0){
    cartItems.innerHTML = `
      <div class="empty-cart">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <p>Keranjang belanja Anda kosong</p>
        <a href="shop.html">Lanjut Belanja →</a>
      </div>`;
    summary.style.display = 'none';
    return;
  }
  
  summary.style.display = 'block';
  cartItems.innerHTML = '';
  let subtotal = 0;
  
  cart.forEach(item => {
    const p = products.find(x => x.id === item.id);
    if(!p) return;
    
    const itemTotal = p.price * item.qty;
    subtotal += itemTotal;
    
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="item-image">
        <img src="assets/products/kaos-sparkle-vision.jpg" alt="">
      </div>
      <div class="item-details">
        <div class="item-name">${p.name}</div>
        <div class="item-price">${formatRp(p.price)}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="updateQty(${p.id}, document.getElementById('qty_${p.id}').value - 1)">−</button>
          <input type="number" id="qty_${p.id}" class="qty-input" value="${item.qty}" min="1" onchange="updateQty(${p.id}, this.value)">
          <button class="qty-btn" onclick="updateQty(${p.id}, parseInt(document.getElementById('qty_${p.id}').value) + 1)">+</button>
        </div>
        <div class="remove-btn" onclick="removeFromCart(${p.id})">Hapus</div>
      </div>`;
    cartItems.appendChild(div);
  });
  
  const shipping = 0;
  const total = subtotal + shipping;
  
  document.getElementById('subtotal').textContent = formatRp(subtotal);
  document.getElementById('shipping').textContent = 'Gratis';
  document.getElementById('total').textContent = formatRp(total);
  updateBadge();
}

function checkout(){
  const cart = getCart();
  if(cart.length === 0) return;
  
  const currentUser = localStorage.getItem('currentUser');
  if(!currentUser){
    alert('Silakan login terlebih dahulu');
    location.href = 'auth.html';
    return;
  }
  
  alert('Pesanan berhasil dibuat! Terima kasih telah berbelanja di VIONVAULT.');
  localStorage.setItem('cart', JSON.stringify([]));
  renderCart();
}

function updateAuthBtn(){
  const currentUser = localStorage.getItem('currentUser');
  const btn = document.getElementById('authBtnCart');
  if(currentUser){
    btn.textContent = 'Logout';
    btn.onclick = () => {
      localStorage.removeItem('currentUser');
      location.href = 'index.html';
    };
  } else {
    btn.textContent = 'Login';
    btn.onclick = () => location.href = 'auth.html';
  }
}

renderCart();
updateAuthBtn();
</script>

</body>
</html>

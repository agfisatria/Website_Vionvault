<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk Favorit — VIONVAULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#0c0c0d; --paper:#f2f0ea; --bone:#e7e4db; --blood:#c8362a; --dim:#8a8880; --line:#2a2a2a;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--paper); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased;}
    a{color:inherit; text-decoration:none;}

    header{
      position:sticky; top:0; z-index:100; background:var(--ink); color:var(--paper);
      display:flex; align-items:center; justify-content:space-between; padding:18px 32px;
      border-bottom:1px solid #1c1c1c;
    }
    .nav-left{display:flex; gap:28px; align-items:center;}
    .nav-left a{font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; position:relative; padding-bottom:3px;}
    .nav-left a::after{content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--blood); transition:width .25s ease;}
    .nav-left a:hover::after{width:100%;}
    .brand{font-family:'Anton', sans-serif; font-size:20px; letter-spacing:.28em; position:absolute; left:50%; transform:translateX(-50%);}
    .nav-right{display:flex; gap:18px; align-items:center;}
    .nav-icon-btn{
      width:36px; height:36px; border-radius:50%;
      border:1px solid rgba(242,240,234,.3); background:transparent; color:var(--paper);
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s ease;
    }
    .nav-icon-btn:hover{background:var(--blood);}
    .nav-icon-btn.active{background:var(--blood);}
    .nav-icon-btn svg{width:16px; height:16px;}
    .auth-btn{
      padding:8px 16px; border-radius:999px; border:1px solid var(--paper);
      background:transparent; color:var(--paper); font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:.2s ease;
    }
    .auth-btn:hover{background:var(--blood); border-color:var(--blood);}

    .page-banner{background:linear-gradient(160deg, #14131a 0%, #1d1c22 40%, #100f13 100%); color:var(--paper); padding:48px 32px 32px; text-align:center;}
    .page-banner h1{font-family:'Anton'; font-size:36px; letter-spacing:.02em; margin-bottom:12px;}
    .page-banner p{color:var(--bone); opacity:.7; font-size:13px;}

    .section-head{padding:32px 32px 20px; display:flex; align-items:baseline; justify-content:space-between; gap:14px;}
    .section-head h2{font-family:'Anton'; font-size:24px;}
    .section-head span{font-size:12px; color:var(--dim); letter-spacing:.05em;}

    .grid-section{padding:8px 32px 64px;}
    .product-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:2px; background:var(--line);}
    .empty-state{grid-column:1/-1; padding:64px 12px; text-align:center;}
    .empty-state svg{width:64px; height:64px; margin-bottom:16px; opacity:.3;}
    .empty-state p{color:var(--dim); margin-bottom:20px;}
    .empty-state a{display:inline-block; padding:10px 20px; background:var(--ink); color:var(--paper); border-radius:999px; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; transition:.2s ease;}
    .empty-state a:hover{background:var(--blood);}

    .card{background:var(--bone); position:relative; display:flex; flex-direction:column;}
    .card-media{position:relative; aspect-ratio:3/4; overflow:hidden; background:#111;}
    .card-media img{width:100%; height:100%; display:block;}
    .card-media img.img-bg{position:absolute; inset:-15%; width:130%; height:130%; object-fit:cover; filter:blur(28px) brightness(.55) saturate(1.15); z-index:1;}
    .card-media img.img-fg{position:relative; z-index:2; object-fit:contain;}
    .card:hover .card-media img{transform:scale(1.045);}
    .fav-btn{
      position:absolute; top:12px; right:12px; z-index:5;
      width:36px; height:36px; border-radius:50%;
      background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.3);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      transition:.2s ease;
    }
    .fav-btn svg{width:18px; height:18px; color:#fff;}
    .fav-btn.active{background:var(--blood); border-color:var(--blood);}
    .fav-btn.active svg{fill:currentColor;}
    .card-info{padding:14px 16px; border-top:1px solid rgba(0,0,0,.08);}
    .name{font-size:12px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; line-height:1.3; display:block; margin-bottom:8px; min-height:32px;}
    .price-row{display:flex; align-items:baseline; gap:8px; margin-bottom:6px; flex-wrap:wrap;}
    .price{font-size:14px; font-weight:800; color:var(--blood);}
    .meta-row{font-size:11px; color:var(--dim);}
    .star{color:#e8a020;}

    footer{background:var(--ink); color:var(--dim); text-align:center; padding:30px 20px; font-size:11px; letter-spacing:.12em; text-transform:uppercase;}

    @media (max-width:900px){ .product-grid{grid-template-columns:repeat(2,1fr);} }
    @media (max-width:560px){
      header{padding:12px 16px;}
      .nav-left{gap:14px;}
      .nav-left a{font-size:10px;}
      .brand{font-size:15px; letter-spacing:.2em;}
      .page-banner h1{font-size:28px;}
    }
  </style>
</head>
<body>

<header>
  <div class="nav-left">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="collection.html">Collection</a>
    <a href="looks.html">Looks</a>
  </div>
  <a href="index.html" class="brand">VIONVAULT</a>
  <div class="nav-right">
    <a href="favorites.html" class="nav-icon-btn active" title="Favorit">
      <svg fill="currentColor" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </a>
    <a href="cart.html" class="nav-icon-btn" title="Keranjang">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </a>
    <button class="auth-btn" id="authBtnFav">Login</button>
  </div>
</header>

<section class="page-banner">
  <h1>♡ Produk Favorit</h1>
  <p>Koleksi produk pilihan Anda</p>
</section>

<div class="section-head">
  <h2 id="favCount">0 Produk Disimpan</h2>
</div>

<section class="grid-section">
  <div class="product-grid" id="favGrid">
    <div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <p>Belum ada produk favorit. Mulai tambahkan produk ke favorit Anda!</p>
      <a href="shop.html">Jelajahi Produk →</a>
    </div>
  </div>
</section>

<footer>© 2026 VionVault — Rework Your Style</footer>

<script>
const products = [
  {id:1, cat:'kaos', img:'assets/products/kaos-sparkle-vision.jpg', name:'T-Shirt Boxy Crop — Sparkle Vision', price:151980, rating:4.9, sold:'22 terjual'},
  {id:2, cat:'longsleeve', img:'assets/products/longsleeve-victory-bound.jpg', name:'Longsleeve Boxy — Victory Bound', price:174440, rating:4.9, sold:'101 terjual'},
  {id:3, cat:'jaket', img:'assets/products/jaket-dragon-mask.jpg', name:'Hoodie Boxy Zipper — Dragon Mask', price:364780, rating:5.0, sold:'11 terjual'},
  {id:4, cat:'hoodie', img:'assets/products/hoodie-midnight-reserve.jpg', name:'Hoodie Boxy — Midnight Reserve', price:334880, rating:4.9, sold:'51 terjual'},
  {id:5, cat:'hoodie', img:'assets/products/hoodie-street-sketch.jpg', name:'Hoodie Boxy — Street Sketch', price:334880, rating:5.0, sold:'17 terjual'},
  {id:6, cat:'longsleeve', img:'assets/products/longsleeve-nitro-rush.jpg', name:'Longsleeve Boxy — Nitro Rush', price:174440, rating:5.0, sold:'9 terjual'},
];

function formatRp(n){ return 'Rp' + n.toLocaleString('id-ID'); }

function getFavorites(){
  const fav = localStorage.getItem('favorites');
  return fav ? JSON.parse(fav) : [];
}

function saveFavorites(favs){
  localStorage.setItem('favorites', JSON.stringify(favs));
}

function toggleFavorite(id){
  const favs = getFavorites();
  if(favs.includes(id)){
    favs.splice(favs.indexOf(id), 1);
  } else {
    favs.push(id);
  }
  saveFavorites(favs);
  renderFavorites();
}

function renderFavorites(){
  const favs = getFavorites();
  const grid = document.getElementById('favGrid');
  const count = document.getElementById('favCount');
  
  grid.innerHTML = '';
  
  if(favs.length === 0){
    grid.innerHTML = `
      <div class="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <p>Belum ada produk favorit. Mulai tambahkan produk ke favorit Anda!</p>
        <a href="shop.html">Jelajahi Produk →</a>
      </div>`;
    count.textContent = '0 Produk Disimpan';
    return;
  }
  
  count.textContent = favs.length + ' Produk Disimpan';
  
  favs.forEach(id => {
    const p = products.find(x => x.id === id);
    if(!p) return;
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-media">
        <button class="fav-btn active" onclick="event.preventDefault(); event.stopPropagation(); toggleFavorite(${p.id});" title="Hapus dari favorit">
          <svg fill="currentColor" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <img src="${p.img}" alt="" class="img-bg" aria-hidden="true">
        <img src="${p.img}" alt="${p.name}" class="img-fg">
      </div>
      <div class="card-info">
        <span class="name">${p.name}</span>
        <div class="price-row"><span class="price">${formatRp(p.price)}</span></div>
        <div class="meta-row"><span class="star">★ ${p.rating}</span><span>·</span><span>${p.sold}</span></div>
      </div>`;
    grid.appendChild(card);
  });
}

function updateAuthBtn(){
  const currentUser = localStorage.getItem('currentUser');
  const btn = document.getElementById('authBtnFav');
  if(currentUser){
    btn.textContent = 'Logout';
    btn.onclick = () => {
      localStorage.removeItem('currentUser');
      location.href = 'index.html';
    };
  } else {
    btn.textContent = 'Login';
    btn.onclick = () => location.href = 'auth.html';
  }
}

renderFavorites();
updateAuthBtn();
</script>

</body>
</html>
